//file:noinspection GrUnresolvedAccess
//file:noinspection GroovyAssignabilityCheck

configurations {
    tests
    testArtifacts
    mockitoAgent
}

dependencies {
    mockitoAgent 'org.mockito:mockito-core:' + rootProject.testLibDependencies.mockitoMockitoCoreVersion
    testImplementation 'org.junit.jupiter:junit-jupiter-api:' + rootProject.testLibDependencies.junitJupiterJunitJupiterApiVersion
    testImplementation 'org.junit.jupiter:junit-jupiter-params:' + rootProject.testLibDependencies.junitJupiterJunitJupiterParamsVersion
    testImplementation 'org.mockito:mockito-core:' + rootProject.testLibDependencies.mockitoMockitoCoreVersion
    testImplementation 'org.mockito:mockito-junit-jupiter:' + rootProject.testLibDependencies.mockitoMockitoJunitJupiterVersion
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:' + rootProject.testLibDependencies.junitJupiterJunitJupiterEngineVersion
}

test {
    useJUnitPlatform()
    jvmArgs("-javaagent:${configurations.mockitoAgent.resolvedConfiguration.resolvedArtifacts[0].file}")
    ignoreFailures = true
    failOnNoDiscoveredTests = false
    reports {
        junitXml.required = true
        html.required = false
    }
    exclude '**/*IntegrationTest*'
}

tasks.register('testJar', Jar) {
    dependsOn testClasses
    archiveBaseName.set("${moduleName}")
    archiveClassifier.set("test")
    from sourceSets.test.output
}

jar.finalizedBy testJar

artifacts {
    testArtifacts testJar
}